<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Tailwind.css</title>
  {#bundle /}
</head>
<body>
<div class="p-10">
  <h1 class="text-5xl">TailwindCSS</h1>
  <hr class="mb-5">
  <p class=text-sm>

    <strong>Welcome to my Tailwind CSS example page!</strong><br>
    Everything you see here is built entirely with <strong>Tailwind CSS</strong>, and <strong>no</strong> custom CSS has
    been added.<br>
  </p>

  <div class="border border-l-8 border-blue-800 shadow rounded-lg mt-8 mb-8">
    <h5 class="text-3xl font-bold m-5">Heading</h5>
    <p class="text-gray-700 text-sm ml-5 mr-5 mb-8">
      Content goes here
    </p>
    <div class="bg-gray-100 pt-5 pb-5 border">
      <p class="text-gray-700 text-bold text-sm ml-5 mr-5">
        Footer content goes here
      </p>
    </div>
  </div>


  <h5 class="text-3xl">Responsive Behaviour</h5>
  <hr class="mb-5">
  <p class="underline
            sm:no-underline
            md:line-through
            lg:underline
            xl:no-underline">
    The quick brown fox jumped over the lazy dog.
  </p>

  <hr class="mt-5 mb-5">
  <div class="text-right">
    <button class="bg-red-500 rounded-lg py-2 px-5 shadow-lg text-green-100 text-sm hover:bg-red-600">
      Cancel
    </button>
    <button class="bg-blue-800 rounded-lg py-2 px-5 shadow-lg text-green-100 text-sm hover:bg-blue-900">
      Submit
    </button>

    <button class="py-3 px-8 bg-red-900 rounded shadow text-white">
      My Button
    </button>
  </div>

</body>
</html>
